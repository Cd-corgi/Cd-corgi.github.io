<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <title>Desencriptador</title>
</head>

<body>
    <div class="row container">
        <div class="container_campos">
            <h1>Encriptador de texto</h1>
            <textarea name="campoTexto" class="texto" id="texto" rows="5" cols="50"
                placeholder="Tu texto encriptado o no encriptado."></textarea>
            <div class="containerError">
                <p id="error" hidden>Error Placeholder</p>
            </div>
            <div class="row">
                <button class="encrypt" onclick="invocar(0)">
                    <span>
                        <i class="fa-solid fa-lock"></i>
                        Encriptar
                    </span>
                </button>
                <button class="clear" onclick="limpiarTexto()">
                    <span>
                        <i class="fa-solid fa-broom"></i>
                        Limpiar campo
                    </span>
                </button>
                <button class="decrypt" onclick="invocar(1)">
                    <span>
                        <i class="fa-solid fa-unlock"></i>
                        Desencriptar
                    </span>
                </button>
            </div>
            <hr>
            <div class="container_redes">
                <h2>Redes sociales</h2>
                <div class="row">
                    <a href="https://github.com/Cd-corgi" class="enlaces github"><i class="fa-brands fa-github"></i></a>
                    <a href="https://discord.com/users/corgi_official1" class="enlaces discord"><i
                            class="fa-brands fa-discord"></i></a>
                    <a href="https://www.youtube.com/channel/UCnkviocxvPGS_80aNjJrCkQ" class="enlaces yt"><i
                            class="fa-brands fa-youtube"></i></a>
                    <a href="https://www.linkedin.com/in/juan-pablo-cortina-hernandez-aa296a200/"
                        class="enlaces linkedin"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <br>
            </div>
        </div>
        <div class="container_output">
            <h1>Salida</h1>
            <textarea name="salida" id="output" rows="10" cols="50" class="salida"
                placeholder="Tu texto encriptado/desencriptado aqui" disabled></textarea>
            <div class="row">
                <button id="copy" class="copy" onclick="copiar()">Copiar contenido</button>
            </div>
            <p style="font-size: 12px;">Página creada por <a class="hiddenLink" href="#">Corgi</a> para el programa
                de<br>Oracle Next Education (ONE)</p>
        </div>
    </div>
    <script src="app.js"></script>
    <script src="https://kit.fontawesome.com/7e3edfeff1.js" crossorigin="anonymous"></script>
</body>

</html>
