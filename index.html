<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Desencriptador By Cd-corgi</title>
</head>

<body>
    <main>
        <div class="logo">
            <img class="letralogo" src="./img/logo.png" alt="" srcset="">
        </div>
        <div class="container">
            <div class="row">
                <div class="zonaTexto">
                    <textarea class="texto" id="texto" cols="35" rows="8"
                        placeholder="Escribe tu texto aqui"></textarea>
                    <p class="leyenda"><i class="fa-solid fa-circle-info"></i> Solo admite letras minúsculas
                        sin ascento</p>
                    <div class="rowBoton">
                        <button class="encriptar" onclick="invocar(0)">Encriptar</button>
                        <div class="espaciador"></div>
                        <button class="desencriptar" onclick="invocar(1)">Desencriptar</button>
                    </div>
                </div>
                <div class="espaciadorR"></div>
                <div class="zonaResultado">
                    <div class="advertencia">
                        <div class="logo2">
                            <img src="./img/image.png" alt="" srcset="" id="advertencia">
                        </div>
                        <h4 class="mensaje" id="ad1">Ningún mensaje fue<br>encontrado</h4>
                        <p class="hint" id="ad2">Ingresa el texto que desees encriptar o<br>desencriptar.</p>
                    </div>
                    <!-- <textarea class="resu" id="resu" cols="28" rows="20" disabled placeholder="hola"></textarea> -->
                    <textarea id="resu" class="resu" disabled></textarea>
                    <!-- <p id="resu" class="resu"></p> -->
                    <button id="copy" class="botonCopiar" onclick="copiar()">Copiar texto</button>
                </div>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
    <script src="https://kit.fontawesome.com/7e3edfeff1.js" crossorigin="anonymous"></script>
</body>

</html>
